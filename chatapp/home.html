<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DotChat - Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #e2e8f0;
        }

        /* APP CONTAINER */
        .app {
            max-width: 600px;
            margin: auto;
            height: 100vh;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        /* New styles for file options modal */
        .file-options-modal .modal-content {
            width: 250px;
            padding: 1rem;
        }

        .file-options-modal .btn-save,
        .file-options-modal .btn-logout {
            width: 100%;
            margin-bottom: 0.5rem;
        }

        /* New styles for voice recorder modal */
        .voice-recorder-modal .modal-content {
            width: 300px;
            padding: 1.5rem;
            text-align: center;
        }

        /* ================= HOME SCREEN ================= */
        .home {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .home-header {
            padding: 24px 20px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
        }

        .home-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .groups-grid {
            padding: 20px;
            display: flex;
            flex-direction: column;
            /* flex-wrap: wrap; */
            gap: 16px;
            overflow-x: auto;
            flex: 1;
            width: 100%;
            /* border: 2px solid red; */
            
            
        }
        
        .group-item {
            position: relative;
            padding: 20px;
            border-radius: 18px;
            cursor: pointer;

            /* Glass effect */
            background: rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            /* Border + glow */
            border: 1px solid rgba(255, 255, 255, 0.15);

            /* Layout */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;

            /* Smooth animation */
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);

            /* Soft shadow */
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.25),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
                height: 20%;
        }

        /* Gradient light overlay */
        .group-item::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.25),
                    rgba(255, 255, 255, 0.05));
            opacity: 0.6;
            pointer-events: none;
        }

        /* Hover effect */
        .group-item:hover {
            transform: translateY(-6px) scale(1.02);

            /* Glow effect */
            box-shadow:
                0 12px 40px rgba(0, 0, 0, 0.35),
                0 0 20px rgba(99, 102, 241, 0.4);

            border-color: rgba(99, 102, 241, 0.6);
        }

        .group-icon {
            width: 48px;
            height: 48px;
            background: #eff6ff;
            color: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 4px;
        }

        .group-name {
            font-weight: 600;
            color: var(--text-main);
            font-size: 15px;
        }

        /* PROFILE BOTTOM */
        .profile-bar {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-img {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .profile-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .profile-id {
            font-size: 12px;
            color: var(--text-muted);
            display: block;
        }

        /* ================= CHAT SCREEN ================= */
        .chat-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-main);
            display: none;
            flex-direction: column;
        }

        /* TOP BAR */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 16px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #e2e8f0;
            z-index: 10;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-main);
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #f1f5f9;
        }

        .chat-title {
            flex: 1;
            text-align: center;
            font-weight: 700;
            color: var(--text-main);
            font-size: 16px;
        }

        /* CHAT BODY */
        .chat-body {
            flex: 1;
            /* padding: 20px; */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            /* max-width: 80%; */
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        .me {
            background: var(--primary);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .other {
            background: white;
            color: var(--text-main);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        /* INPUT */
        .chat-input {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 16px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .plus-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f1f5f9;
            border: none;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 18px;
            border-radius: 24px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .chat-input input:focus {
            border-color: var(--primary);
        }

        .chat-input button {
            padding: 12px 24px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        .chat-input button:hover {
            background: var(--primary-dark);
        }

        /* PROFILE MODAL */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
    /* Overlay */
.gm-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

/* Card */
.gm-card {
    width: 330px;
    padding: 22px;
    border-radius: 18px;
    background: rgba(255,255,255,0.95);
    box-shadow: 0 12px 35px rgba(0,0,0,0.25);
    animation: gmFade 0.3s ease;
}

/* Title */
.gm-title {
    margin: 0;
    text-align: center;
    font-size: 20px;
    color: #222;
    font-weight: 600;
}

/* List */
.gm-list {
    margin-top: 16px;
    max-height: 280px;
    overflow-y: auto;
}

/* Each item */
.gm-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 6px;
    border-bottom: 1px solid #eee;
    transition: 0.2s;
}

.gm-item:hover {
    background: #f3f6ff;
    border-radius: 10px;
}

/* User info */
.gm-user {
    display: flex;
    flex-direction: column;
}

.gm-name {
    font-size: 15px;
    color: #111;
}

.gm-role {
    font-size: 12px;
    color: #777;
}

/* Call Button */
.gm-call-btn {
    background: linear-gradient(135deg, #00c853, #00e676);
    border: none;
    color: #fff;
    padding: 6px 14px;
    border-radius: 25px;
    font-size: 13px;
    cursor: pointer;
    transition: 0.25s ease;
}

.gm-call-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 5px 15px rgba(0,200,83,0.4);
}

/* Close Button */
.gm-close-btn {
    margin-top: 14px;
    width: 100%;
    padding: 10px;
    border-radius: 12px;
    border: none;
    background: #222;
    color: #fff;
    cursor: pointer;
    transition: 0.2s;
}

.gm-close-btn:hover {
    background: #000;
}

/* Animation */
@keyframes gmFade {
    from {
        opacity: 0;
        transform: scale(0.85);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}

        .modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .close-modal {
            cursor: pointer;
            font-size: 20px;
            color: var(--text-muted);
        }

        .form-group-modal {
            margin-bottom: 16px;
        }

        .form-group-modal label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .form-group-modal input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            outline: none;
            font-size: 14px;
        }

        .form-group-modal input:focus {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-logout {
            background: #fee2e2;
            color: #ef4444;
            border: none;
            padding: 12px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="app">

        <!-- HOME -->
        <div class="home" id="homeScreen">
            <div class="home-header">
                <h1>DotChat</h1>
            </div>

            <div class="groups-grid" id="group-list"></div>

            <div class="profile-bar">
                <div class="profile-img">
                    <span id="profileInitial">U</span>
                    <img id="display-profile-pic-main" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                </div>
                <div class="profile-name" id="profileName"></div>
            </div>
        </div>

        <!-- CHAT -->
        <div class="chat-screen" id="chatScreen">

            <div class="chat-header" id="chat-header">
                <div class="back-btn" id="backBtn"><i class="fas fa-chevron-left"></i></div>
                <div class="chat-title" id="chatTitle"></div>
            </div>

            <div class="chat-body" id="chatBody"></div>

            <div class="chat-input">
                <button class="plus-btn" id="plusBtn"><i class="fas fa-plus"></i></button>
                <input type="text" id="message-input" placeholder="Type message...">
                <button id="sendBtn">Send <i class="fas fa-paper-plane" style="margin-left: 5px;"></i></button>
            </div>

        </div>

        <!-- PROFILE MODAL -->
        <div class="modal-overlay" id="profileModal">
            <div class="modal-content">
                <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>Profile Settings</h2>
                    <i class="fas fa-times close-modal" id="closeModal"></i>
                </div>
                <div class="form-group-modal">
                    <label>Profile Picture</label>
                    <img id="display-profile-pic" src=""
                        style="width: 80px; height: 80px; border-radius: 50%; display: block; margin: 10px auto; object-fit: cover; border: 2px solid var(--primary);">
                    <input type="file" id="profile-pic-input" accept="image/*" style="display: none;">
                    <button class="btn-save" onclick="document.getElementById('profile-pic-input').click()"
                        style="background: var(--text-muted); font-size: 12px; padding: 5px; margin: 0 auto; display: block; width: auto;">Change
                        Photo</button>
                </div>
                <div class="form-group-modal">
                    <label>Full Name</label>
                    <input type="text" id="updateName" placeholder="Enter your name">
                </div>
                <div class="form-group-modal">
                    <label>Profile Image URL</label>
                    <input type="text" id="updateImage" placeholder="https://example.com/photo.jpg">
                </div>
                <div class="modal-actions">
                    <button class="btn-save" id="saveProfileBtn">Save Changes</button>
                    <button class="btn-logout" id="logoutBtn">Logout</button>
                </div>
            </div>
        </div>

        <!-- File Upload Options Modal -->
        <div id="file-options-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="width: 250px; padding: 1rem;">
                <h4 style="margin-bottom: 1rem;">Send File</h4>
                <button id="send-media-btn" class="btn-save" style="width: 100%; margin-bottom: 0.5rem;"><i
                        class="fas fa-image"></i> Send Media</button>
                <button id="send-document-btn" class="btn-save" style="width: 100%; margin-bottom: 0.5rem;"><i
                        class="fas fa-file-alt"></i> Send Document</button>
                <button id="record-voice-btn" class="btn-save" style="width: 100%;"><i class="fas fa-microphone"></i>
                    Record Voice</button>
                <button class="btn-logout" style="width: 100%; margin-top: 1rem;"
                    onclick="document.getElementById('file-options-modal').style.display='none'">Cancel</button>
            </div>
        </div>
        <!-- Incoming Call Modal -->
        <div id="incoming-call-modal" class="modal-overlay" style="display: none;"></div>

        <!-- Hidden File Inputs -->
        <input type="file" id="mediaInput" style="display: none;" accept="image/*,video/*,audio/*">
        <input type="file" id="documentInput" style="display: none;" accept="*/*">
        <!-- Voice Recording UI -->
        <div id="voice-recorder-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content" style="width: 300px; padding: 1.5rem; text-align: center;">
                <h4 id="recording-status">Recording...</h4>
                <div style="margin: 1.5rem 0;">
                    <button id="stop-recording-btn" class="btn-logout"
                        style="background: #dc3545; color: white; margin-right: 1rem;"><i class="fas fa-stop"></i>
                        Stop</button>
                    <button id="send-recording-btn" class="btn-save" style="display: none;"><i
                            class="fas fa-paper-plane"></i> Send</button>
                    <audio id="audio-preview" controls style="display: none; width: 100%; margin-top: 1rem;"></audio>
                </div>
                <button class="btn-logout"
                    onclick="document.getElementById('voice-recorder-modal').style.display='none'; window.stopRecording(true);">Cancel</button>
            </div>
        </div>

    </div>

    <!-- Socket.io Client Library (CDN) -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="/chatapp/home.js"></script>
</body>

</html>
